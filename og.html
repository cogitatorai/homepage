<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap');
body {
    width: 1200px;
    height: 630px;
    background: #f8f7f5;
    font-family: "Rajdhani", system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
}
/* Dot grid background */
body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, #dddbd6 1px, transparent 1px);
    background-size: 24px 24px;
}
.card {
    position: relative;
    text-align: center;
    padding: 0 80px;
}
.logo {
    width: 80px;
    height: 80px;
    margin-bottom: 24px;
}
.title {
    font-size: 72px;
    font-weight: 700;
    color: #242220;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    line-height: 1.05;
    margin-bottom: 16px;
}
.rule {
    width: 80px;
    height: 3px;
    background: #d4550a;
    margin: 0 auto 24px;
}
.tagline {
    font-size: 32px;
    font-weight: 600;
    color: #3a3835;
    line-height: 1.3;
}
.url {
    position: absolute;
    bottom: 40px;
    right: 60px;
    font-size: 20px;
    font-weight: 600;
    color: #a09d98;
    letter-spacing: 0.05em;
}
</style>
</head>
<body>
<div class="card">
    <img src="logo.svg" class="logo" alt="">
    <div class="title">Cogitator</div>
    <div class="rule"></div>
    <div class="tagline">Your AI that learns and adapts</div>
</div>
<span class="url">cogitator.me</span>
</body>
</html>
